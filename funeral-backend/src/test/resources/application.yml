quarkus:
  http:
    port: 8912
    cors:
      enabled: true
      origins: "*"
  mongodb:
    connection-string: mongodb://localhost:27017
    database: funeral-test
  smallrye-jwt:
    enabled: true
  jacoco:
    data-file: target/jacoco-quarkus.exec
    reuse-data-file: true

oci:
  auth:
    enabled: true
    allow-anonymous-pull: true
    realm: http://localhost:8912/v2/token
    service: funeral-registry
    auto-create:
      enabled: true
      username: admin
      password: password
      email: admin@funeral.local
      roles: ADMIN;USER;PUSH_ALL;PULL_ALL
  storage:
    no-mongo: true
    no-minio: true
    local-storage-path: /tmp/funeral-test-storage

smallrye-jwt:
  sign:
    key:
      location: classpath:privateKey.pem
    algorithm: RS256

mp:
  jwt:
    verify:
      publickey:
        location: classpath:publicKey.pem
      issuer: funeral-registry