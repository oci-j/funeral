name: Build Native Binary

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '25'
  GRAALVM_VERSION: '25'

# Default permissions for all jobs
permissions:
  contents: read

jobs:
  build-jvm:
    name: Build JVM Version
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 8

    - name: Sync frontend versions from pom.xml
      working-directory: ./
      run: ./sync-frontend-from-pom.sh

    - name: Install frontend dependencies
      working-directory: ./funeral-frontend
      run: pnpm install

    - name: Lint frontend
      working-directory: ./funeral-frontend
      run: pnpm run lint

    - name: Run frontend tests
      working-directory: ./funeral-frontend
      run: pnpm run test:coverage

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage-${{ github.sha }}
        path: funeral-frontend/coverage/
        retention-days: 7

    - name: Build frontend
      working-directory: ./funeral-frontend
      run: pnpm run build

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and install bbolt-java
      run: |
        if [ ! -d ../bbolt-java ]; then
          git clone https://github.com/oci-j/bbolt-java.git ../bbolt-java
        fi
        mvn -B -f ../bbolt-java/pom.xml install -DskipTests

    - name: Build with Maven
      working-directory: ./funeral-backend
      run: mvn -B clean package -DskipTests

    - name: Run backend tests
      working-directory: ./funeral-backend
      run: mvn -B test

    - name: Upload backend jacoco exec
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: backend-jacoco-exec-${{ github.sha }}
        path: funeral-backend/target/jacoco-quarkus.exec
        retention-days: 1

    - name: Upload JVM JAR
      uses: actions/upload-artifact@v7
      with:
        name: funeral-jvm-${{ github.sha }}
        path: funeral-backend/target/funeral.jar
        retention-days: 7

  build-native:
    name: Build Native Binary with GraalVM
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 8

    - name: Sync frontend versions from pom.xml
      working-directory: ./
      run: ./sync-frontend-from-pom.sh

    - name: Install frontend dependencies
      working-directory: ./funeral-frontend
      run: pnpm install

    - name: Lint frontend
      working-directory: ./funeral-frontend
      run: pnpm run lint

    - name: Run frontend tests
      working-directory: ./funeral-frontend
      run: pnpm run test:coverage

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage-${{ github.sha }}
        path: funeral-frontend/coverage/
        retention-days: 7

    - name: Build frontend
      working-directory: ./funeral-frontend
      run: pnpm run build

    - name: Set up JDK 25 (for Maven cache)
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and install bbolt-java
      run: |
        if [ ! -d ../bbolt-java ]; then
          git clone https://github.com/oci-j/bbolt-java.git ../bbolt-java
        fi
        mvn -B -f ../bbolt-java/pom.xml install -DskipTests

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'graalvm-community'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        native-image-job-reports: 'true'

    - name: Build Native Binary
      run: |
        VERSION=$(cat ../VERSION 2>/dev/null || echo "unknown")
        echo "VERSION: ${VERSION}"
        echo "BINARY_NAME=funeral" >> $GITHUB_ENV
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "Tag build: enabling release compression (level 10 + ultra-brute)"
          mvn -B clean package -Pnative,release-compression -DskipTests
        else
          mvn -B clean package -Pnative -DskipTests
        fi
        if [ ! -f "target/funeral" ]; then
          echo "Error: Expected binary target/funeral not found"
          ls -la target/
          exit 1
        fi
      working-directory: ./funeral-backend

    - name: Display Binary Info
      working-directory: ./funeral-backend
      run: |
        if [ -f "target/${BINARY_NAME}" ]; then
          echo "=== Binary Information ==="
          ls -lh "target/${BINARY_NAME}"
          file "target/${BINARY_NAME}"
          echo ""
          echo "=== Binary Size ==="
          du -h "target/${BINARY_NAME}"
        else
          echo "Native binary not found: target/${BINARY_NAME}"
          ls -la target/
          exit 1
        fi

    - name: Native Binary Smoke Test
      working-directory: ./funeral-backend
      run: |
        chmod +x target/funeral
        echo "=== CLI version check ==="
        ./target/funeral --version
        ./target/funeral version
        echo "=== Start server and health check ==="
        ./target/funeral serve &
        SERVER_PID=$!
        for i in {1..30}; do
          if curl -sf http://localhost:8911/funeral_addition/health >/dev/null 2>&1; then
            echo "Health check passed"
            kill $SERVER_PID
            wait $SERVER_PID 2>/dev/null || true
            exit 0
          fi
          sleep 1
        done
        echo "Health check failed"
        kill $SERVER_PID 2>/dev/null || true
        exit 1

    - name: Upload Native Binary
      uses: actions/upload-artifact@v7
      with:
        name: funeral-native-${{ github.sha }}
        path: funeral-backend/target/${{ env.BINARY_NAME }}
        retention-days: 7

    - name: Upload Build Reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: build-reports-${{ github.sha }}
        path: |
          funeral-backend/target/surefire-reports/
          funeral-backend/target/native-tests/
        retention-days: 3
        if-no-files-found: ignore

  docker-push-pull:
    name: Docker Push/Pull Integration
    runs-on: ubuntu-latest
    needs: build-native

    steps:
    - uses: actions/checkout@v7

    - name: Download native binary
      uses: actions/download-artifact@v8
      with:
        name: funeral-native-${{ github.sha }}
        path: funeral-native

    - name: Make native binary executable
      run: chmod +x funeral-native/funeral

    - name: Configure Docker insecure registry
      run: |
        python3 - <<'PY' > /tmp/daemon.json
        import json
        import os
        path = '/etc/docker/daemon.json'
        d = {}
        if os.path.exists(path):
            with open(path) as f:
                d = json.load(f)
        d.setdefault('insecure-registries', [])
        if 'localhost:8911' not in d['insecure-registries']:
            d['insecure-registries'].append('localhost:8911')
        print(json.dumps(d, indent=2))
        PY
        sudo cp /tmp/daemon.json /etc/docker/daemon.json
        sudo systemctl restart docker || sudo service docker restart
        for i in {1..30}; do
          if docker info >/dev/null 2>&1; then
            echo "Docker daemon is ready"
            break
          fi
          sleep 1
        done
        docker info >/dev/null 2>&1 || { echo "Docker daemon did not become ready"; exit 1; }

    - name: Start Funeral registry
      run: |
        export LOCAL_STORAGE_PATH=/tmp/funeral-docker-test
        export AUTH_REALM=http://localhost:8911/v2/token
        export AUTH_SERVICE=funeral-registry
        ./funeral-native/funeral serve &
        echo "SERVER_PID=$!" >> $GITHUB_ENV
        for i in {1..30}; do
          if curl -sf http://localhost:8911/funeral_addition/health >/dev/null 2>&1; then
            echo "Funeral registry is healthy"
            exit 0
          fi
          sleep 1
        done
        echo "Funeral registry did not become healthy"
        exit 1

    - name: Docker login, push and pull
      run: |
        docker pull alpine:3.20
        docker tag alpine:3.20 localhost:8911/smoke/alpine:3.20
        docker login localhost:8911 -u admin -p password
        docker push localhost:8911/smoke/alpine:3.20
        docker rmi localhost:8911/smoke/alpine:3.20
        docker pull localhost:8911/smoke/alpine:3.20

    - name: Verify with Funeral CLI
      run: |
        ./funeral-native/funeral login localhost:8911 -u admin -p password
        ./funeral-native/funeral repo list localhost:8911

    - name: Stop Funeral registry
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
        fi

  containerd-image-store-integration:
    name: Containerd Image Store Integration Test
    runs-on: ubuntu-latest
    needs: build-jvm

    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and install bbolt-java
      run: |
        if [ ! -d ../bbolt-java ]; then
          git clone https://github.com/oci-j/bbolt-java.git ../bbolt-java
        fi
        mvn -B -f ../bbolt-java/pom.xml install -DskipTests

    - name: Start Docker-in-Docker
      run: |
        if docker pull docker:29-dind >/dev/null 2>&1; then
          DIND_IMAGE="docker:29-dind"
        else
          DIND_IMAGE="docker:dind"
        fi
        echo "Using dind image: $DIND_IMAGE"
        docker run -d --name dind \
          -e DOCKER_TLS_CERTDIR="" \
          --privileged \
          "$DIND_IMAGE"

    - name: Wait for Docker daemon
      run: |
        for i in {1..15}; do
          docker exec dind docker info >/dev/null 2>&1 && exit 0
          sleep 2
        done
        echo "Docker daemon did not start"
        docker logs dind
        exit 1

    - name: Pull test image and verify containerd image store
      run: |
        docker exec dind docker pull alpine:3.20
        docker exec dind docker info -f '{{ .DriverStatus }}' | tee /tmp/driver-status.txt
        if ! grep -qi containerd /tmp/driver-status.txt; then
          echo "Containerd image store not enabled"
          exit 1
        fi

    - name: Prepare real metadata.db and containerd blobs
      run: |
        METADATA_DB="/var/lib/docker/containerd/daemon/io.containerd.metadata.v1.bolt/meta.db"
        CONTENT_DIR="/var/lib/docker/containerd/daemon/io.containerd.content.v1.content"
        if ! docker exec dind test -f "$METADATA_DB"; then
          echo "metadata.db not found at $METADATA_DB"
          exit 1
        fi
        if ! docker exec dind test -d "$CONTENT_DIR"; then
          echo "content dir not found at $CONTENT_DIR"
          exit 1
        fi
        echo "metadata.db path: $METADATA_DB"
        echo "content dir path: $CONTENT_DIR"
        docker exec dind sh -c 'kill -TERM $(cat /var/run/docker.pid 2>/dev/null || pidof dockerd)' || true
        docker wait dind || true
        mkdir -p ./funeral-backend/target/real-docker-root/containerd/daemon/io.containerd.metadata.v1.bolt
        docker cp "dind:$METADATA_DB" ./funeral-backend/target/real-docker-root/containerd/daemon/io.containerd.metadata.v1.bolt/meta.db
        mkdir -p ./funeral-backend/target/real-containerd-blobs
        docker cp "dind:$CONTENT_DIR" ./funeral-backend/target/real-containerd-blobs/
        docker rm -f dind

    - name: Dump metadata.db structure
      run: |
        if command -v bbolt >/dev/null 2>&1; then
          bbolt pages ./funeral-backend/target/real-docker-root/containerd/daemon/io.containerd.metadata.v1.bolt/meta.db
        else
          echo "bbolt CLI not available, skipping page dump"
        fi

    - name: Run containerd image store integration test
      working-directory: ./funeral-backend
      run: |
        mvn -B test -Dtest=ContainerdFileResolverIntegrationTest \
          -Doci.docker-local.real-metadata-db=target/real-docker-root/containerd/daemon/io.containerd.metadata.v1.bolt/meta.db \
          -Doci.docker-local.real-containerd-root=target/real-containerd-blobs

    - name: Download backend jacoco exec
      uses: actions/download-artifact@v8
      with:
        name: backend-jacoco-exec-${{ github.sha }}
        path: /tmp/backend-jacoco-exec

    - name: Merge coverage and generate report
      working-directory: ./funeral-backend
      run: |
        mv /tmp/backend-jacoco-exec/jacoco-quarkus.exec target/jacoco-backend.exec
        mvn -B jacoco:merge@merge-coverage jacoco:report@report-merged

    - name: Upload merged backend coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: backend-coverage-${{ github.sha }}
        path: funeral-backend/target/jacoco-merged-report/
        retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-jvm, build-native]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v7

    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Prepare Release Files
      run: |
        mkdir -p release-files
        # Read version from VERSION file
        VERSION=$(cat VERSION 2>/dev/null || echo "unknown")
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        # Copy native binary with versioned name
        NATIVE_BINARY=$(find artifacts -name "funeral" | head -1)
        if [ -f "$NATIVE_BINARY" ]; then
          cp "$NATIVE_BINARY" "release-files/funeral-${VERSION}"
          BINARY_SIZE=$(du -h "$NATIVE_BINARY" | cut -f1)
          echo "BINARY_SIZE=$BINARY_SIZE" >> $GITHUB_ENV
        else
          echo "Error: Native binary funeral not found in artifacts"
          find artifacts -type f -name "*funeral*" | head -20
          exit 1
        fi
        # Copy JVM JAR
        JVM_JAR=$(find artifacts -name "funeral.jar" | head -1)
        if [ -f "$JVM_JAR" ]; then
          cp "$JVM_JAR" "release-files/funeral-${VERSION}.jar"
        else
          echo "Error: JVM JAR funeral.jar not found in artifacts"
          find artifacts -type f -name "*funeral*" | head -20
          exit 1
        fi
        # Create checksums
        cd release-files
        sha256sum * > checksums.txt
        cd ..

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        name: Funeral Registry ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          release-files/funeral-${{ env.VERSION }}
          release-files/funeral-${{ env.VERSION }}.jar
          release-files/checksums.txt
        body: |
          ## 🎉 Funeral OCI Registry ${{ github.ref_name }}

            ### 📦 Native Binary
            - **File:** `funeral-${{ env.VERSION }}`
            - **Platform:** Linux x86_64
            - **Size:** ${{ env.BINARY_SIZE }}
            - **Features:** Zero-dependency, fast startup

          ### 📦 JVM Version
          - **File:** `funeral-${{ env.VERSION }}.jar`
          - **Requirements:** Java 25 or higher

          ### 🔧 Quick Start

          #### Using Native Binary
          ```bash
          chmod +x funeral-${{ env.VERSION }}
          ./funeral-${{ env.VERSION }} serve
          ```

          #### Using JVM Version
          ```bash
          java -jar funeral-${{ env.VERSION }}.jar serve
          ```

          #### CLI Commands
          ```bash
          ./funeral-${{ env.VERSION }} --help
          ./funeral-${{ env.VERSION }} login 192.168.8.9:8911 -u admin -p password
          ./funeral-${{ env.VERSION }} repo list
          ```

          ### 🏗️ Build Details
          - **Commit:** ${{ github.sha }}
          - **Built with:** GraalVM ${{ env.GRAALVM_VERSION }}
          - **Timestamp:** ${{ github.event.repository.updated_at }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  coverage-pages:
    name: Deploy Coverage Badges to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-jvm, containerd-image-store-integration]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v7

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage-${{ github.sha }}
          path: frontend-coverage

      - name: Generate coverage badge JSON
        run: |
          mkdir -p pages
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET

          # backend
          root = ET.parse('backend-coverage/jacoco.xml').getroot()
          for c in root.findall('counter'):
              if c.get('type') == 'INSTRUCTION':
                  covered = int(c.get('covered'))
                  missed = int(c.get('missed'))
                  pct = round(covered / (covered + missed) * 100)
                  break
          else:
              pct = 0
          color = 'green' if pct >= 80 else 'yellow' if pct >= 60 else 'red'
          with open('pages/coverage-backend.json', 'w') as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "backend coverage",
                  "message": f"{pct}%",
                  "color": color
              }, f)

          # frontend
          with open('frontend-coverage/coverage-summary.json') as f:
              summary = json.load(f)
          total = summary['total']
          pct = round(sum(total[k]['pct'] for k in ['lines', 'statements', 'functions', 'branches']) / 4)
          color = 'green' if pct >= 80 else 'yellow' if pct >= 60 else 'red'
          with open('pages/coverage-frontend.json', 'w') as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "frontend coverage",
                  "message": f"{pct}%",
                  "color": color
              }, f)
          PY
          mkdir -p pages/backend
          cp -R backend-coverage/* pages/backend/
          mv pages/backend/index.html pages/backend/coverage.html
          mkdir -p pages/frontend
          cp -R frontend-coverage/* pages/frontend/
          mv pages/frontend/index.html pages/frontend/coverage.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
